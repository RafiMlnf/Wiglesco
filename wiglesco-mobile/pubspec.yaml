name: wiglesco_mobile
description: Wiglesco — AI-powered 3D Parallax & Wigglegram Creator
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # HTTP Client (hanya untuk health check / fallback, bukan wajib)
  dio: ^5.7.0

  # ── ON-DEVICE AI PIPELINE ──────────────────────────────────
  # ONNX Runtime — jalankan Depth Anything V2 model (.onnx) on-device
  flutter_onnxruntime: ^1.6.0

  # Pure Dart image processing (parallax synthesis, style effects)
  image: ^4.2.0

  # Video encoding (MP4, GIF) tanpa server menggunakan hardware-accelerated encoder
  flutter_quick_video_encoder: ^1.0.3

  # Camera & Media
  image_picker: ^1.1.2
  video_player: ^2.9.2

  # File System
  path_provider: ^2.1.5

  # Save to gallery & Share
  gal: ^2.3.0
  share_plus: ^10.1.4

  # Local Storage
  shared_preferences: ^2.3.3
  hive_flutter: ^1.1.0

  # UI Helpers
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # Icons (built-in via flutter)
  cupertino_icons: ^1.0.8

  # Authentication
  google_sign_in: ^6.2.1

dependency_overrides:
  path_provider_android: ">=2.2.0 <2.3.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/models/    # TFLite model files
